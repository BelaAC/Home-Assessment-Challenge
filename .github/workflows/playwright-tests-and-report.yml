name: Take Home Challenge - Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write # Needed for GitHub Pages deployment

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI Tests
        run: npx playwright test --project=ui
        env:
          CI: true
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}

      - name: Run API Tests
        run: npx playwright test --project=api
        env:
          CI: true
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}

      - name: Upload test results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Deploy HTML report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          publish_branch: gh-pages
          force_orphan: true

      - name: Add summary to GitHub Actions
        if: always()
        run: |
          echo "##Playwright Tests Completed" >> $GITHUB_STEP_SUMMARY
          echo "[View the report on GitHub Pages](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
